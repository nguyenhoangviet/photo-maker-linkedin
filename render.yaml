services:
  - type: web
    name: photo-maker-linkedin-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: standard          # 2GB RAM — enough for face detect + bg removal
    healthCheckPath: /
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false         # set this in Render dashboard after Vercel URL is known
